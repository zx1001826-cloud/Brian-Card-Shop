    const catalog = document.getElementById("catalog");
    const modal = document.getElementById("productModal");
    const closeModal = document.getElementById("closeModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalDesc = document.getElementById("modalDesc");
    const modalCover = document.getElementById("modalCover");
    const modalType = document.getElementById("modalType");
    const modalStock = document.getElementById("modalStock");
    const modalPrizes = document.getElementById("modalPrizes");
    const modalLineLink = document.getElementById("modalLineLink");
    const modalNotice = document.getElementById("modalNotice");
    const imageLightbox = document.getElementById("imageLightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");

    function createPlaceholderImage(title, subtitle = "POKÉMON TCG") {
      const safeTitle = String(title || "Pokemon Pack").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const safeSubtitle = String(subtitle || "Card").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200"><rect width="900" height="1200" rx="48" fill="#0a0a0c"/><rect x="34" y="34" width="832" height="1132" rx="36" fill="none" stroke="#d4af37" stroke-width="4" opacity="0.75"/><text x="70" y="130" fill="#d4af37" font-size="34" font-family="Arial">BRIAN CARD SHOP</text><text x="70" y="250" fill="#ffffff" font-size="74" font-weight="700" font-family="Arial">${safeTitle}</text><text x="70" y="320" fill="#cfcfcf" font-size="32" font-family="Arial">${safeSubtitle}</text><rect x="70" y="390" width="760" height="520" rx="28" fill="#111114" stroke="#2a2a2f" stroke-width="3"/><circle cx="450" cy="650" r="150" fill="none" stroke="#d4af37" stroke-width="10" opacity="0.85"/><circle cx="450" cy="650" r="40" fill="#d4af37" opacity="0.9"/><line x1="300" y1="650" x2="600" y2="650" stroke="#d4af37" stroke-width="12" opacity="0.8"/></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function imageWithFallback(primary, fallback, title, subtitle) {
      return primary || fallback || createPlaceholderImage(title, subtitle);
    }

    function openLightbox(src, caption) {
      lightboxImage.src = src;
      lightboxCaption.textContent = caption || "";
      imageLightbox.classList.add("show");
      imageLightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      imageLightbox.classList.remove("show");
      imageLightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxCaption.textContent = "";
      if (!modal.classList.contains("show")) document.body.style.overflow = "";
    }

    function bindZoomableImages(scope = document) {
      scope.querySelectorAll(".zoomable").forEach((img) => {
        img.onclick = (event) => {
          event.stopPropagation();
          openLightbox(img.currentSrc || img.src, img.dataset.caption || img.alt || "");
        };
      });
    }

    function renderCatalog() {
      catalog.innerHTML = products.map(product => `
        <article class="item-card" data-id="${product.id}">
          <div class="thumb-wrap">
            <span class="type-badge">${product.type}</span>
            <span class="stock-badge">${product.stock}</span>
            <img class="zoomable" data-caption="${product.name}｜美版封面圖" src="${imageWithFallback(product.cover, product.coverFallback, product.name, product.type)}" alt="${product.name} 封面" onerror="this.onerror=null; this.src=createPlaceholderImage('${product.name.replace(/'/g, "\'")}', '${product.type.replace(/'/g, "\'")}');">
          </div>
          <div class="card-body">
            <h4>${product.name}</h4>
            <p>${product.desc}</p>
            <div class="chase-preview">${product.topHits.slice(0, 3).map(hit => `<span class="chase-pill">${hit.name}</span>`).join("")}</div>
            <div class="cta-row"><span class="mini-link">點擊查看大獎</span><span class="mini-link">LINE 詢問</span></div>
          </div>
        </article>
      `).join("");

      bindZoomableImages(catalog);
      document.querySelectorAll(".item-card").forEach(card => {
        card.addEventListener("click", () => {
          const productId = Number(card.dataset.id);
          const product = products.find(item => item.id === productId);
          if (product) openProduct(product);
        });
      });
    }

    function openProduct(product) {
      modalTitle.textContent = product.name;
      modalDesc.textContent = product.desc;
      modalCover.src = imageWithFallback(product.cover, product.coverFallback, product.name, product.type);
      modalCover.alt = `${product.name} 封面圖`;
      modalCover.classList.add("zoomable");
      modalCover.dataset.caption = `${product.name}｜美版封面圖`;
      modalCover.onerror = () => { modalCover.onerror = null; modalCover.src = createPlaceholderImage(product.name, product.type); };
      modalType.textContent = product.type;
      modalStock.textContent = product.stock;
      modalLineLink.href = lineUrl;
      modalNotice.textContent = `想詢問 ${product.name} 的價格、盒況、封面實拍或其他系列，也可以直接加 LINE。`;

      modalPrizes.innerHTML = product.topHits.map(hit => `
        <div class="prize-card">
          <img class="zoomable" data-caption="${product.name}｜${hit.name}｜美版大獎圖" src="${imageWithFallback(hit.image, product.coverFallback, hit.name, hit.tag)}" alt="${hit.name}" onerror="this.onerror=null; this.src=createPlaceholderImage('${hit.name.replace(/'/g, "\'")}', '${hit.tag.replace(/'/g, "\'")}');">
          <div class="text"><strong>${hit.name}</strong><span>${hit.tag}</span></div>
        </div>
      `).join("");

      bindZoomableImages(modal);
      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function hideModal() {
      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
      if (!imageLightbox.classList.contains("show")) document.body.style.overflow = "";
    }

    lightboxClose.addEventListener("click", closeLightbox);
    imageLightbox.addEventListener("click", (event) => { if (event.target === imageLightbox) closeLightbox(); });
    closeModal.addEventListener("click", hideModal);
    modal.addEventListener("click", (event) => { if (event.target === modal) hideModal(); });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (imageLightbox.classList.contains("show")) closeLightbox(); else hideModal();
      }
    });

    renderCatalog();
  </script>
